<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Täzegülüm üçin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle, #fff5f7 0%, #fce4ec 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
        }

        /* Arka plandaki çiçeklerin stil alanı */
        .flower {
            position: absolute;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.3; }
        }

        /* Ana Kart Tasarımı */
        .card {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.6);
            animation: heartBeat 2s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 80px;
            color: #d81b60;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        p {
            font-size: 20px;
            color: #ad1457;
            letter-spacing: 2px;
            margin-top: 10px;
            font-weight: 300;
        }

        .heart-icon {
            color: #e91e63;
            font-size: 40px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Täzegülüm</h1>
        <p>Seniň bilen her günümi gülüp geçirýän aklm:D...</p>
        <div class="heart-icon">❤</div>
    </div>

    <script>
        function createFlower() {
            const flowerEmojis = ['🌸', '🌹', '🌺', '🌷', '🌻', '🌼'];
            const flower = document.createElement('div');
            flower.classList.add('flower');
            
            // Rastgele çiçek seçimi ve özellikleri
            flower.innerText = flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)];
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animationDuration = Math.random() * 3 + 2 + 's'; // 2-5 saniye arası düşüş
            flower.style.fontSize = Math.random() * 20 + 20 + 'px';
            flower.style.opacity = Math.random();

            document.body.appendChild(flower);

            // Ekran dolmasın diye belli süre sonra sil
            setTimeout(() => {
                flower.remove();
            }, 5000);
        }

        // Her 300 milisaniyede bir yeni çiçek oluştur
        setInterval(createFlower, 300);
    </script>
</body>
</html>
